<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הסרה מרשימת תפוצה - בית המדרש</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --primary: #f59e0b;
            --error: #ef4444;
            --success: #22c55e;
            --muted: #64748b;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: var(--card);
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 450px;
            width: 90%;
            transition: all 0.3s ease;
        }

        h1 {
            margin-top: 0;
            font-size: 1.5rem;
        }

        p {
            line-height: 1.6;
            color: var(--muted);
        }

        .status-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="card" id="status-card">
        <div class="loader"></div>
        <h1>מעבד את בקשתך...</h1>
        <p>אנא המתן רגע בזמן שאנו מעדכנים את העדפות הדיוור שלך.</p>
    </div>

    <script>
        // הגדרות Supabase התואמות ל-api.js
        const SUPABASE_URL = 'https://dsaxhbmyvjtdmcbxnnlj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRzYXhoYm15vjtdmcbxnnljIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY2ODI1NTcsImV4cCI6MjA4MjI1ODU1N30.F31n85Lm2e5-mDC83TlstJY9Pya3GOAyIRilDcL_5Hc';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function handleUnsubscribe() {
            const urlParams = new URLSearchParams(window.location.search);
            const email = urlParams.get('email');
            const card = document.getElementById('status-card');

            if (!email) {
                card.innerHTML = `<div class="status-icon">⚠️</div><h1>כתובת לא תקינה</h1><p>לא נמצאה כתובת אימייל בקישור. נא לוודא שהעתקת את הקישור המלא מהמייל שקיבלת.</p>`;
                return;
            }

            try {
                // עדכון עמודת marketing_consent ל-false עבור האימייל הספציפי
                const { error } = await supabaseClient
                    .from('users')
                    .update({ marketing_consent: false })
                    .eq('email', email.toLowerCase());

                if (error) throw error;

                card.innerHTML = `<div class="status-icon" style="color:var(--success)">✅</div><h1>הוסרת בהצלחה</h1><p>כתובת האימייל <strong>${email}</strong> הוסרה מרשימת התפוצה. לא תקבל מאיתנו הודעות שיווקיות נוספות.</p>`;
            } catch (err) {
                console.error('Unsubscribe error:', err);
                card.innerHTML = `<div class="status-icon" style="color:var(--error)">❌</div><h1>שגיאה בעדכון</h1><p>אירעה תקלה בעת ניסיון ההסרה. ניתן לפנות לתמיכה או לנסות שוב מאוחר יותר.</p>`;
            }
        }

        window.onload = handleUnsubscribe;
    </script>
</body>

</html>
