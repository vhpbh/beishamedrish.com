<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מחברת חידושים</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #3b82f6; --accent: #ca8a04; --bg-main: #f8fafc; --bg-sidebar: #ffffff; --border-color: #e2e8f0; }
        body { font-family: 'Heebo', sans-serif; margin: 0; padding: 0; background: var(--bg-main); display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 280px; background: var(--bg-sidebar); border-left: 1px solid var(--border-color); display: flex; flex-direction: column; transition: width 0.3s; }
        .sidebar-header { padding: 1rem; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .sidebar-header h2 { margin: 0; font-size: 1.1rem; color: #1e293b; }
        .note-list { flex: 1; overflow-y: auto; padding: 0.5rem; }
        .note-item { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 1rem; border-radius: 8px; cursor: pointer; margin-bottom: 0.25rem; transition: 0.2s; border: 2px solid transparent; }
        .note-item:hover { background: #f1f5f9; }
        .note-item.active { background: #eff6ff; border-color: var(--primary); color: #1e40af; font-weight: 700; }
        .note-item-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .note-item-actions { display: none; }
        .note-item:hover .note-item-actions, .note-item.active .note-item-actions { display: flex; gap: 0.5rem; }
        .main-area { flex: 1; display: flex; flex-direction: column; }
        .toolbar { padding: 0.5rem 1rem; border-bottom: 1px solid var(--border-color); display: flex; gap: 0.5rem; align-items: center; background: #fff; }
        .editor { flex: 1; padding: 2rem 3rem; outline: none; overflow-y: auto; font-size: 1.1rem; line-height: 1.7; color: #333; }
        .btn-tool { background: none; border: none; width: 36px; height: 36px; border-radius: 6px; cursor: pointer; color: #64748b; transition: 0.2s; font-size: 1rem; }
        .btn-tool:hover { background: #f1f5f9; color: #334155; }
        .btn-tool.active { background: #e2e8f0; color: #000; }
        .btn-primary { background: var(--primary); color: white; border: none; }
        .btn-primary:hover { background: #2563eb; }
        .empty-state { display: flex; align-items: center; justify-content: center; height: 100%; color: #94a3b8; flex-direction: column; text-align: center; }
        .save-status { font-size: 0.8rem; color: #64748b; margin-left: auto; transition: opacity 0.5s; }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <h2><i class="fas fa-book-open" style="color: var(--accent);"></i> המחברת שלי</h2>
        <button class="btn-tool btn-primary" onclick="createNewNote()" title="דף חדש"><i class="fas fa-plus"></i></button>
    </div>
    <div class="note-list" id="noteList"></div>
</div>

<div class="main-area">
    <div class="toolbar" id="toolbar" style="display:none;">
        <button class="btn-tool" onclick="formatDoc('bold')" title="הדגשה"><i class="fas fa-bold"></i></button>
        <button class="btn-tool" onclick="formatDoc('italic')" title="הטיה"><i class="fas fa-italic"></i></button>
        <button class="btn-tool" onclick="formatDoc('underline')" title="קו תחתון"><i class="fas fa-underline"></i></button>
        <div style="width: 1px; height: 20px; background: #e2e8f0; margin: 0 5px;"></div>
        <button class="btn-tool" onclick="downloadNote()" title="הורדה כקובץ טקסט"><i class="fas fa-download"></i></button>
        <button class="btn-tool" onclick="shareNote()" title="שתף עם החברותא"><i class="fas fa-user-friends"></i></button>
        <div class="save-status" id="saveStatus"></div>
    </div>
    <div id="editor" class="editor" contenteditable="true" style="display:none;" oninput="handleInput()"></div>
    <div id="emptyState" class="empty-state">
        <i class="fas fa-book-open" style="font-size: 3rem; margin-bottom: 15px; opacity: 0.3;"></i>
        <p style="font-size: 1.1rem; font-weight: 500;">בחר דף מהרשימה או צור דף חדש</p>
        <p style="font-size: 0.9rem; max-width: 80%;">כאן תוכל לרכז את כל חידושי התורה וההערות שלך על הלימוד.</p>
    </div>
</div>

<script>
    let notes = [];
    let activeNoteId = null;
    let context = null;
    let saveDebounce;

    // טעינת נתונים מהחלון הראשי
    window.onload = function() {
        try {
            const stored = localStorage.getItem('current_notes_context');
            if (stored) {
                context = JSON.parse(stored);
                if (Array.isArray(context.notes)) {
                    notes = context.notes.map((n, i) => ({
                        id: n.id || Date.now() + i,
                        title: n.title || `חידוש ${i+1}`,
                        content: n.content || n,
                        date: n.date || new Date().toISOString()
                    }));
                }
                renderList();
                if (notes.length > 0) {
                    loadNote(notes[0].id);
                }
            }
        } catch (e) { console.error(e); }
    };

    function renderList() {
        const list = document.getElementById('noteList');
        list.innerHTML = '';
        if (notes.length === 0) {
            list.innerHTML = `<div style="text-align: center; color: #94a3b8; padding: 1rem; font-size: 0.9rem;">אין עדיין דפים במחברת זו.</div>`;
            return;
        }
        notes.forEach(note => {
            const div = document.createElement('div');
            div.className = `note-item ${activeNoteId === note.id ? 'active' : ''}`;
            div.onclick = () => loadNote(note.id);
            div.innerHTML = `
                <span class="note-item-title">${note.title}</span>
                <div class="note-item-actions">
                    <button class="btn-tool" onclick="event.stopPropagation(); editNoteTitle('${note.id}')" title="שנה שם"><i class="fas fa-pen"></i></button>
                </div>
            `;
            list.appendChild(div);
        });
    }

    function loadNote(id) {
        activeNoteId = id;
        const note = notes.find(n => n.id === id);
        if (!note) {
            activeNoteId = null;
            document.getElementById('emptyState').style.display = 'flex';
            document.getElementById('toolbar').style.display = 'none';
            document.getElementById('editor').style.display = 'none';
            renderList();
            return;
        }

        document.getElementById('emptyState').style.display = 'none';
        document.getElementById('toolbar').style.display = 'flex';
        const editor = document.getElementById('editor');
        editor.style.display = 'block';
        editor.innerHTML = note.content;
        editor.focus();
        renderList();
    }

    async function createNewNote() {
        const title = await window.parent.customPrompt("שם הדף החדש:", "חידוש חדש");
        if (!title) return;

        const newNote = {
            id: Date.now(),
            title: title,
            content: '<div>התחל לכתוב כאן...</div>',
            date: new Date().toISOString()
        };
        notes.unshift(newNote); // הוספה לראש הרשימה
        renderList();
        loadNote(newNote.id);
        saveNotes();
    }

    async function editNoteTitle(noteId) {
        const note = notes.find(n => n.id === noteId);
        if (!note) return;
        const newTitle = await window.parent.customPrompt('ערוך את שם הדף:', note.title);
        if (newTitle && newTitle.trim() !== '') {
            note.title = newTitle.trim();
            renderList();
            saveNotes();
        }
    }

    function handleInput() {
        if (activeNoteId) {
            const note = notes.find(n => n.id === activeNoteId);
            if (note) {
                note.content = document.getElementById('editor').innerHTML;
                const statusEl = document.getElementById('saveStatus');
                statusEl.textContent = 'עורך...';
                statusEl.style.opacity = '1';
                clearTimeout(saveDebounce);
                saveDebounce = setTimeout(() => {
                    saveNotes();
                }, 2000); // שמירה אוטומטית לאחר 2 שניות
            }
        }
    }

function saveNotes() {
    // בדיקה שכל האובייקטים קיימים לפני הניסיון לשמור
    if (window.parent && window.parent.updateGoalNotes && context && context.goalId) {
        
        // שליחת הנתונים לשמירה
        window.parent.updateGoalNotes(context.goalId, notes);
        
        const statusEl = document.getElementById('saveStatus');
        if (statusEl) {
            statusEl.textContent = 'נשמר בענן ✓';
            statusEl.style.opacity = '1'; // כדאי לוודא שהאלמנט גלוי לפני ה-setTimeout
            setTimeout(() => { 
                statusEl.style.opacity = '0'; 
            }, 2000);
        }
    } else {
        console.error("שגיאה בשמירת פתק: נתוני הלימוד (context) או מזהה הלימוד (goalId) חסרים.", {context});
        if (window.parent && window.parent.customAlert) {
            window.parent.customAlert("שגיאה קריטית: לא ניתן לשמור את הפתק. נסה לסגור ולפתוח את חלון הפתקים.");
        }
    }
}

    function formatDoc(cmd, value = null) {
        document.execCommand(cmd, false, value);
        document.getElementById('editor').focus();
        handleInput(); // Trigger auto-save after formatting
    }

    function downloadNote() {
        if (!activeNoteId) return;
        const note = notes.find(n => n.id === activeNoteId);
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = note.content;
        const text = tempDiv.innerText;

        const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${note.title}.txt`;
        a.click();
        URL.revokeObjectURL(a.href);
    }

    async function shareNote() {
        if (!activeNoteId) return;
        const note = notes.find(n => n.id === activeNoteId);

        if (!context.partnerName) {
            window.parent.customAlert("אין חברותא מוגדרת ללימוד זה, לא ניתן לשתף.");
            return;
        }

        const canEdit = await window.parent.customConfirm(`האם לשתף את "${note.title}" עם ${context.partnerName}?\n\nלחץ 'אישור' כדי לתת הרשאת עריכה, או 'ביטול' כדי לשתף לצפייה בלבד.`);

        const parentSupabase = window.parent.supabaseClient;
        const currentUser = window.parent.currentUser;

        if (parentSupabase && currentUser) {
            const partnerEmail = getPartnerEmail();
            if (!partnerEmail) {
                return window.parent.customAlert("שגיאה בזיהוי החברותא.");
            }

            // This is a simulation of how it would work with a dedicated notes table.
            // In a full implementation, this would create a record in `note_collaborators`.
            // For now, we send a chat message.
            const permissionText = canEdit ? 'עם הרשאת עריכה' : 'לצפייה בלבד';
            const msg = `📄 שיתפתי איתך את דף החידושים "<strong>${note.title}</strong>" (${permissionText}).`;

            try {
                await parentSupabase.from('chat_messages').insert([{
                    sender_email: currentUser.email,
                    receiver_email: partnerEmail,
                    message: msg,
                    is_html: true
                }]);
                window.parent.showToast("הודעת שיתוף נשלחה לחברותא!", "success");
                window.parent.customAlert("שיתוף פתקים בזמן אמת דורש שדרוג של מסד הנתונים. כרגע, נשלחה לחברותא הודעה על השיתוף. \n\nלצורך יישום מלא, יש להוסיף את טבלאות `notes` ו-`note_collaborators` כפי שמפורט בהצעה.", true);
            } catch(e) {
                console.error(e);
                window.parent.customAlert("שגיאה בשיתוף.");
            }
        }
    }

    function getPartnerEmail() {
        if (window.parent && window.parent.chavrutaConnections && context.bookName) {
            const connections = window.parent.chavrutaConnections;
            const conn = connections.find(c => c.book === context.bookName);
            return conn ? conn.email : null;
        }
        return null;
    }
</script>
</body>
</html>
