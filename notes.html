<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מחברת חידושים</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --accent: #ca8a04;
            --bg-main: #f8fafc;
            --bg-sidebar: #ffffff;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Heebo', sans-serif;
            margin: 0;
            padding: 0;
            background: var(--bg-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 280px;
            background: var(--bg-sidebar);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: width 0.3s;
        }

        .sidebar-header {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header h2 {
            margin: 0;
            font-size: 1.1rem;
            color: #1e293b;
        }

        .note-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .note-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 0.25rem;
            transition: 0.2s;
            border: 2px solid transparent;
        }

        .note-item:hover {
            background: #f1f5f9;
        }

        .note-item.active {
            background: #eff6ff;
            border-color: var(--primary);
            color: #1e40af;
            font-weight: 700;
        }

        .note-item-title {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .note-item-actions {
            display: none;
        }

        .note-item:hover .note-item-actions,
        .note-item.active .note-item-actions {
            display: flex;
            gap: 0.5rem;
        }

        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .toolbar {
            padding: 0.5rem 1rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 0.5rem;
            align-items: center;
            background: #fff;
        }

        .editor {
            flex: 1;
            padding: 2rem 3rem;
            outline: none;
            overflow-y: auto;
            font-size: 1.1rem;
            line-height: 1.7;
            color: #333;
        }

        .btn-tool {
            background: none;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 6px;
            cursor: pointer;
            color: #64748b;
            transition: 0.2s;
            font-size: 1rem;
        }

        .btn-tool:hover {
            background: #f1f5f9;
            color: #334155;
        }

        .btn-tool.active {
            background: #e2e8f0;
            color: #000;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
        }

        .btn-primary:hover {
            background: #2563eb;
        }

        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #94a3b8;
            flex-direction: column;
            text-align: center;
        }

        .save-status {
            font-size: 0.8rem;
            color: #64748b;
            margin-left: auto;
            transition: opacity 0.5s;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        .editor:empty:before {
            content: "התחל לכתוב כאן...";
            color: #94a3b8;
            pointer-events: none;
            display: block;
        }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1000;
            display: none; align-items: center; justify-content: center;
        }
        .modal-box {
            background: white; padding: 20px; border-radius: 12px;
            width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: right; border: 1px solid #e2e8f0;
        }
        .collaborator-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 0; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem;
        }
        .perm-badge {
            font-size: 0.75rem; padding: 2px 6px; border-radius: 4px;
            background: #e2e8f0; color: #475569;
        }
        .shared-icon {
            margin-left: 5px; color: var(--primary); font-size: 0.8rem;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2><i class="fas fa-book-open" style="color: var(--accent);"></i> המחברת שלי</h2>
            <button class="btn-tool btn-primary" onclick="createNewNote()" title="דף חדש"><i
                    class="fas fa-plus"></i></button>
        </div>
        <div class="note-list" id="noteList"></div>
    </div>

    <div class="main-area">
        <div class="toolbar" id="toolbar" style="display:none;">
            <button class="btn-tool" onclick="formatDoc('bold')" title="הדגשה"><i class="fas fa-bold"></i></button>
            <button class="btn-tool" onclick="formatDoc('italic')" title="הטיה"><i class="fas fa-italic"></i></button>
            <button class="btn-tool" onclick="formatDoc('underline')" title="קו תחתון"><i
                    class="fas fa-underline"></i></button>
            <div style="width: 1px; height: 20px; background: #e2e8f0; margin: 0 5px;"></div>
            <button class="btn-tool" onclick="downloadNote()" title="הורדה כקובץ טקסט"><i
                    class="fas fa-download"></i></button>
            <button class="btn-tool" onclick="shareNote()" title="שתף עם החברותא"><i
                    class="fas fa-user-friends"></i></button>
            <div class="save-status" id="saveStatus"></div>
        </div>
        <div id="editor" class="editor" contenteditable="true" style="display:none;" oninput="handleInput()"></div>
        <div id="emptyState" class="empty-state">
            <i class="fas fa-book-open" style="font-size: 3rem; margin-bottom: 15px; opacity: 0.3;"></i>
            <p style="font-size: 1.1rem; font-weight: 500;">בחר דף מהרשימה או צור דף חדש</p>
            <p style="font-size: 0.9rem; max-width: 80%;">כאן תוכל לרכז את כל חידושי התורה וההערות שלך על הלימוד.</p>
        </div>
    </div>

    <div id="shareModal" class="modal-overlay">
        <div class="modal-box">
            <h3 style="margin-top:0; color:#1e293b;">ניהול שיתוף</h3>
            <p id="shareNoteTitle" style="font-size:0.9rem; color:#64748b; margin-bottom:15px;"></p>
            
            <div style="margin-bottom:15px;">
                <label style="font-size:0.85rem; font-weight:bold; color:#334155;">הוסף שותף:</label>
                <div style="display:flex; gap:5px; margin-top:5px;">
                    <input type="text" id="newCollabEmail" placeholder="אימייל..." style="flex:1; padding:6px; border:1px solid #cbd5e1; border-radius:6px; font-size:0.9rem;">
                    <select id="newCollabPerm" style="padding:2px; border-radius:6px; border:1px solid #cbd5e1; font-size:0.8rem;">
                        <option value="view">צפייה</option>
                        <option value="edit">עריכה</option>
                    </select>
                    <button onclick="addCollaborator()" style="background:var(--primary); color:white; border:none; border-radius:6px; width:30px; cursor:pointer;">+</button>
                </div>
            </div>
            <div id="collaboratorsList" style="max-height:150px; overflow-y:auto; margin-bottom:15px;"></div>
            <div style="text-align:left;">
                <button onclick="closeShareModal()" style="background:#e2e8f0; border:none; padding:6px 12px; border-radius:6px; cursor:pointer; color:#334155;">סגור</button>
            </div>
        </div>
    </div>

    <script>
        let notes = [];
        let activeNoteId = null;
        let context = null;
        let currentUser = null;
        let supabase = null;
        let saveDebounce;

        window.onload = async function () {
            try {
                if (window.parent) {
                    currentUser = window.parent.currentUser;
                    supabase = window.parent.supabaseClient;
                }
                const stored = localStorage.getItem('current_notes_context');
                if (stored) {
                    context = JSON.parse(stored);
                    
                    if (supabase && currentUser && context.bookName) {
                        await loadNotesFromDB();
                    } else {
                        if (Array.isArray(context.notes)) {
                            notes = context.notes.map((n, i) => ({
                                id: n.id || Date.now() + i,
                                title: n.title || `חידוש ${i + 1}`,
                                content: (n.content || n) === '<div>התחל לכתוב כאן...</div>' ? '' : (n.content || n),
                                date: n.date || new Date().toISOString(),
                                is_shared: false
                            }));
                        }
                    }
                    
                    renderList();
                    if (notes.length > 0) {
                        loadNote(notes[0].id);
                    }
                }
            } catch (e) { console.error(e); }
        };

        async function loadNotesFromDB() {
            const { data, error } = await supabase
                .from('notes')
                .select('*')
                .eq('book_name', context.bookName)
                .eq('user_email', currentUser.email);

            const { data: shared, error: sharedError } = await supabase
                .from('notes')
                .select('*, note_collaborators!inner(permission_level)')
                .eq('note_collaborators.collaborator_email', currentUser.email)
                .eq('book_name', context.bookName);

            let dbNotes = [];
            if (data) dbNotes = [...data];
            if (shared) {
                shared.forEach(n => {
                    n.is_shared_with_me = true;
                    n.permission = n.note_collaborators[0].permission_level;
                    dbNotes.push(n);
                });
            }

            if (dbNotes.length > 0) {
                notes = dbNotes.map(n => ({
                    ...n,
                    is_shared: n.is_shared_with_me || false 
                }));
            } else if (context.notes && context.notes.length > 0) {
                for (let n of context.notes) {
                    const content = (n.content || n) === '<div>התחל לכתוב כאן...</div>' ? '' : (n.content || n);
                    const { data: inserted } = await supabase.from('notes').insert({
                        user_email: currentUser.email,
                        book_name: context.bookName,
                        title: n.title || 'חידוש חדש',
                        content: content
                    }).select().single();
                    if (inserted) notes.push(inserted);
                }
            }
        }

        function renderList() {
            const list = document.getElementById('noteList');
            list.innerHTML = '';
            if (notes.length === 0) {
                list.innerHTML = `<div style="text-align: center; color: #94a3b8; padding: 1rem; font-size: 0.9rem;">אין עדיין דפים במחברת זו.</div>`;
                return;
            }
            notes.forEach(note => {
                const div = document.createElement('div');
                div.className = `note-item ${activeNoteId === note.id ? 'active' : ''}`;
                div.onclick = () => loadNote(note.id);
                const shareIcon = note.is_shared || note.is_shared_with_me ? '<i class="fas fa-users shared-icon" title="משותף"></i>' : '';
                div.innerHTML = `
                <span class="note-item-title">${shareIcon} ${note.title}</span>
                <div class="note-item-actions">
                    <button class="btn-tool" onclick="event.stopPropagation(); editNoteTitle('${note.id}')" title="שנה שם"><i class="fas fa-pen"></i></button>
                    <button class="btn-tool" onclick="event.stopPropagation(); deleteNote('${note.id}')" title="מחק"><i class="fas fa-trash-alt"></i></button>
                </div>
            `;
                list.appendChild(div);
            });
        }

        function loadNote(id) {
            activeNoteId = id;
            const note = notes.find(n => n.id === id);
            if (!note) {
                activeNoteId = null;
                document.getElementById('emptyState').style.display = 'flex';
                document.getElementById('toolbar').style.display = 'none';
                document.getElementById('editor').style.display = 'none';
                renderList();
                return;
            }

            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('toolbar').style.display = 'flex';
            const editor = document.getElementById('editor');
            editor.style.display = 'block';
            
            if (note.is_shared_with_me && note.permission === 'view') {
                editor.contentEditable = false;
                document.getElementById('saveStatus').innerText = 'צפייה בלבד';
            } else {
                editor.contentEditable = true;
                document.getElementById('saveStatus').innerText = '';
            }

            editor.innerHTML = note.content;
            if (editor.innerText.trim() === 'התחל לכתוב כאן...') {
                editor.innerHTML = '';
            }
            editor.focus();

            const range = document.createRange();
            range.selectNodeContents(editor);
            range.collapse(false);
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);

            renderList();
        }

        async function createNewNote() {
            const title = await window.parent.customPrompt("שם הדף החדש:", "חידוש חדש");
            if (!title) return;

            const newNote = {
                id: 'temp-' + Date.now(), 
                title: title,
                content: '',
                date: new Date().toISOString()
            };
            notes.unshift(newNote); 
            renderList();
            loadNote(newNote.id);
            saveNotes();
        }

        async function deleteNote(noteId) {
            if (window.parent && window.parent.customConfirm) {
                if (!(await window.parent.customConfirm("האם אתה בטוח שברצונך למחוק דף זה?"))) return;
            } else if (!confirm("האם אתה בטוח שברצונך למחוק דף זה?")) return;

            notes = notes.filter(n => n.id != noteId);
            
            if (supabase && typeof noteId === 'string' && !noteId.startsWith('temp-')) {
                await supabase.from('notes').delete().eq('id', noteId);
            }

            if (activeNoteId == noteId) {
                activeNoteId = null;
                document.getElementById('emptyState').style.display = 'flex';
                document.getElementById('toolbar').style.display = 'none';
                document.getElementById('editor').style.display = 'none';
            }
            saveNotes();
            renderList();
        }

        async function editNoteTitle(noteId) {
            const note = notes.find(n => n.id === noteId);
            if (!note) return;
            const newTitle = await window.parent.customPrompt('ערוך את שם הדף:', note.title);
            if (newTitle && newTitle.trim() !== '') {
                note.title = newTitle.trim();
                renderList();
                saveNotes();
            }
        }

        function handleInput() {
            if (activeNoteId) {
                const note = notes.find(n => n.id === activeNoteId);
                if (note) {
                    note.content = document.getElementById('editor').innerHTML;
                    const statusEl = document.getElementById('saveStatus');
                    statusEl.textContent = 'עורך...';
                    statusEl.style.opacity = '1';
                    clearTimeout(saveDebounce);
                    saveDebounce = setTimeout(() => {
                        saveNotes();
                    }, 2000); 
                }
            }
        }

        async function saveNotes() {
            if (!activeNoteId) return;
            const note = notes.find(n => n.id === activeNoteId);
            if (!note) return;

            if (supabase && currentUser) {
                if (note.is_shared_with_me && note.permission === 'view') return; 

                const payload = {
                    title: note.title,
                    content: note.content,
                    updated_at: new Date().toISOString()
                };

                if (typeof note.id === 'string' && note.id.startsWith('temp-')) {
                    payload.user_email = currentUser.email;
                    payload.book_name = context.bookName;
                    const { data, error } = await supabase.from('notes').insert(payload).select().single();
                    if (data) {
                        note.id = data.id; 
                    }
                } else {
                    await supabase.from('notes').update(payload).eq('id', note.id);
                }
            }

            if (window.parent && window.parent.updateGoalNotes && context && context.goalId) {
                window.parent.updateGoalNotes(context.goalId, notes);

                const statusEl = document.getElementById('saveStatus');
                if (statusEl) {
                    statusEl.textContent = 'נשמר בענן ✓';
                    statusEl.style.opacity = '1'; 
                    setTimeout(() => {
                        statusEl.style.opacity = '0';
                    }, 2000);
                }
            } else {
                console.error("שגיאה בשמירת פתק: נתוני הלימוד (context) או מזהה הלימוד (goalId) חסרים.", { context });
                if (window.parent && window.parent.customAlert) {
                    window.parent.customAlert("שגיאה קריטית: לא ניתן לשמור את הפתק. נסה לסגור ולפתוח את חלון הפתקים.");
                }
            }
        }

        function formatDoc(cmd, value = null) {
            document.execCommand(cmd, false, value);
            document.getElementById('editor').focus();
            handleInput(); 
        }

        function downloadNote() {
            if (!activeNoteId) return;
            const note = notes.find(n => n.id === activeNoteId);
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = note.content;
            const text = tempDiv.innerText;

            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `${note.title}.txt`;
            a.click();
            URL.revokeObjectURL(a.href);
        }

        async function shareNote() {
            if (!activeNoteId) return;
            const note = notes.find(n => n.id === activeNoteId);
            
            if (typeof note.id === 'string' && note.id.startsWith('temp-')) {
                await saveNotes(); 
            }

            if (note.is_shared_with_me) {
                window.parent.customAlert("אינך יכול לשתף פתק ששותף איתך.");
                return;
            }

            document.getElementById('shareModal').style.display = 'flex';
            document.getElementById('shareNoteTitle').innerText = `שיתוף: ${note.title}`;
            
            const partnerEmail = getPartnerEmail();
            if (partnerEmail) document.getElementById('newCollabEmail').value = partnerEmail;

            loadCollaborators(note.id);
        }

        async function loadCollaborators(noteId) {
            const list = document.getElementById('collaboratorsList');
            list.innerHTML = 'טוען...';
            
            const { data, error } = await supabase
                .from('note_collaborators')
                .select('*')
                .eq('note_id', noteId);

            list.innerHTML = '';
            if (data && data.length > 0) {
                data.forEach(c => {
                    const div = document.createElement('div');
                    div.className = 'collaborator-row';
                    div.innerHTML = `
                        <span>${c.collaborator_email} <span class="perm-badge">${c.permission_level === 'edit' ? 'עריכה' : 'צפייה'}</span></span>
                        <div>
                            <button onclick="changePermission('${c.id}', '${c.permission_level}')" style="font-size:0.8rem; margin-left:5px; cursor:pointer;">שנה</button>
                            <button onclick="removeCollaborator('${c.id}')" style="color:red; border:none; background:none; cursor:pointer;">&times;</button>
                        </div>
                    `;
                    list.appendChild(div);
                });
            } else {
                list.innerHTML = '<div style="text-align:center; color:#94a3b8; font-size:0.8rem; padding:10px;">אין משתמשים משותפים</div>';
            }
        }

        async function addCollaborator() {
            const email = document.getElementById('newCollabEmail').value.trim();
            const perm = document.getElementById('newCollabPerm').value;
            const note = notes.find(n => n.id === activeNoteId);

            if (!email) return;
            if (!currentUser) return;

            const { error } = await supabase.from('note_collaborators').insert({
                note_id: note.id,
                owner_email: currentUser.email,
                collaborator_email: email,
                permission_level: perm
            });

            if (error) {
                alert('שגיאה בהוספה (אולי המשתמש כבר קיים?)');
            } else {
                loadCollaborators(note.id);
                document.getElementById('newCollabEmail').value = '';
                note.is_shared = true; 
                renderList();
            }
        }

        async function removeCollaborator(id) {
            if (!confirm('להסיר גישה?')) return;
            await supabase.from('note_collaborators').delete().eq('id', id);
            loadCollaborators(activeNoteId);
        }

        async function changePermission(id, current) {
            const newPerm = current === 'view' ? 'edit' : 'view';
            await supabase.from('note_collaborators').update({ permission_level: newPerm }).eq('id', id);
            loadCollaborators(activeNoteId);
        }

        function closeShareModal() {
            document.getElementById('shareModal').style.display = 'none';
        }

        function getPartnerEmail() {
            if (window.parent && window.parent.chavrutaConnections && context.bookName) {
                const connections = window.parent.chavrutaConnections;
                const conn = connections.find(c => c.book === context.bookName);
                return conn ? conn.email : null;
            }
            return null;
        }
    </script>
</body>

</html>
