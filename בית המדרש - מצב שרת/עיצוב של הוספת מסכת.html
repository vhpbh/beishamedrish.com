<!DOCTYPE html>

<html dir="rtl" lang="he"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>בית המדרש - הוספת מסכת חדשה</title>
<!-- Tailwind CSS v3 with Plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts for Hebrew (Assistant is a good choice for modern clean look) -->
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&amp;display=swap" rel="stylesheet"/>
<style data-purpose="custom-config">
    body {
      font-family: 'Assistant', sans-serif;
      background-color: #f8fafc;
    }
    .brand-orange { color: #e8951a; }
    .bg-brand-orange { background-color: #e8951a; }
    .brand-dark-blue { color: #1a2333; }
    .bg-brand-dark-blue { background-color: #1a2333; }
    .nav-shadow { box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .card-shadow { box-shadow: 0 10px 30px rgba(0,0,0,0.04); }
    .bottom-nav-shadow { box-shadow: 0 -4px 20px rgba(0,0,0,0.08); }
  </style>
</head>
<body class="min-h-screen pb-32">
<!-- BEGIN: MainHeader -->
<header class="bg-white nav-shadow sticky top-0 z-50 px-4 py-3 md:px-8">
<div class="max-w-7xl mx-auto flex items-center justify-between">
<!-- Right Section: Logo and Search -->
<div class="flex items-center gap-6 lg:gap-12 flex-1">
<!-- Logo -->
<div class="flex items-center gap-3">
<div class="bg-brand-orange p-2 rounded-xl text-white">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<div class="hidden sm:block">
<h1 class="font-bold text-lg brand-dark-blue leading-tight">בית המדרש</h1>
<p class="text-xs text-gray-400">תשע</p>
</div>
</div>
<!-- Search Bar -->
<div class="relative w-full max-w-md hidden md:block">
<input class="w-full bg-gray-100 border-none rounded-full py-2.5 pr-10 pl-4 focus:ring-2 focus:ring-orange-200 transition-all text-sm" placeholder="חיפוש..." type="text"/>
<div class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400">
<svg class="h-5 w-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
</div>
</div>
<!-- Left Section: Actions and Profile -->
<div class="flex items-center gap-2 md:gap-5">
<button class="p-2 text-gray-400 hover:text-brand-orange transition-colors hidden sm:block">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
<button class="bg-brand-orange text-white px-5 py-2 rounded-full font-bold flex items-center gap-2 shadow-lg shadow-orange-200 hover:bg-orange-600 transition-all">
<svg class="h-5 w-5" fill="currentColor" viewbox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path>
</svg>
<span class="text-sm">מנוי / תרומה</span>
</button>
<div class="flex items-center gap-3">
<div class="relative">
<button class="p-2 text-gray-500 hover:bg-gray-100 rounded-full transition-colors">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
<span class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full ring-2 ring-white"></span>
</div>
<div class="w-10 h-10 rounded-full ring-2 ring-brand-orange/20 p-0.5 cursor-pointer">
<div class="w-full h-full bg-gray-200 rounded-full flex items-center justify-center text-gray-500 overflow-hidden">
<svg class="h-6 w-6" fill="currentColor" viewbox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" fill-rule="evenodd"></path>
</svg>
</div>
</div>
</div>
</div>
</div>
</header>
<!-- END: MainHeader -->
<!-- BEGIN: MainContent -->
<main class="max-w-4xl mx-auto px-4 py-8 md:py-12">
<!-- Back Button -->
<div class="mb-6">
<a class="inline-flex items-center gap-2 text-sm text-gray-500 hover:text-brand-orange transition-colors font-semibold group" href="#">
<svg class="h-5 w-5 transform group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M17 8l4 4m0 0l-4 4m4-4H3" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
        חזרה לתפריט
      </a>
</div>
<!-- Main Form Card -->
<div class="bg-white rounded-[2rem] card-shadow overflow-hidden border border-gray-100">
<!-- Card Header Decorative Border -->
<div class="h-2 bg-brand-orange w-full"></div>
<div class="p-8 md:p-12">
<div class="flex items-center justify-between mb-10">
<div class="flex items-center gap-4">
<div class="bg-brand-orange/10 p-3 rounded-2xl">
<svg class="h-8 w-8 brand-orange" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<h2 class="text-3xl font-bold brand-dark-blue">הוספת מסכת חדשה</h2>
</div>
</div>
<!-- Form Elements -->
<form class="space-y-8">
<!-- Select Masechet -->
<div class="space-y-3" data-purpose="form-group">
<label class="block text-lg font-bold brand-dark-blue pr-2">חפש ספר ללימוד</label>
<div class="relative group">
<input class="w-full bg-white border-2 border-gray-100 rounded-2xl p-5 pr-14 focus:border-brand-orange focus:ring-0 transition-all text-lg placeholder:text-gray-300" placeholder="הקלד שם מסכת או ספר..." type="text"/>
<div class="absolute right-5 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-brand-orange transition-colors">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
</div>
<p class="text-sm text-gray-400 pr-2">בחר ספר מהרשימה או חפש ספר חדש</p>
</div>
<!-- Select Plan -->
<div class="space-y-3" data-purpose="form-group">
<label class="block text-lg font-bold brand-dark-blue pr-2">תכנון זמן</label>
<div class="relative">
<select class="w-full bg-white border-2 border-gray-100 rounded-2xl p-5 appearance-none focus:border-brand-orange focus:ring-0 transition-all text-lg brand-dark-blue">
<option value="free">קצב חופשי (ללא תאריך יעד)</option>
<option value="fixed">תאריך סיום קבוע</option>
<option value="daily">לימוד יומי</option>
</select>
<div class="absolute left-5 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none">
<svg class="h-5 w-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M19 9l-7 7-7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
</div>
</div>
<!-- Dedication -->
<div class="space-y-3" data-purpose="form-group">
<label class="block text-lg font-bold brand-dark-blue pr-2">הקדשה (אופציונלי)</label>
<div class="relative">
<input class="w-full bg-white border-2 border-gray-100 rounded-2xl p-5 focus:border-brand-orange focus:ring-0 transition-all text-lg placeholder:text-gray-300" placeholder="לעילוי נשמת / לרפואת..." type="text"/>
</div>
</div>
<!-- Submit Button -->
<div class="pt-6">
<button class="w-full bg-brand-dark-blue text-white font-bold py-6 rounded-2xl text-xl shadow-xl hover:bg-slate-800 transform active:scale-[0.98] transition-all" type="submit">
              התחל לימוד
            </button>
</div>
</form>
</div>
</div>
</main>
<!-- END: MainContent -->
<!-- BEGIN: BottomNavigation -->
<nav class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50">
<div class="bg-white rounded-full bottom-nav-shadow px-6 py-3 flex items-center justify-between gap-12 border border-gray-100 relative min-w-[400px]">
<!-- Right Nav Items -->
<div class="flex items-center gap-10">
<button class="flex flex-col items-center gap-1 group">
<div class="text-brand-orange">
<svg class="h-6 w-6" fill="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a2 2 0 002 2h2a1 1 0 001-1v-4h2v4a1 1 0 001 1h2a2 2 0 002-2v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path>
</svg>
</div>
<span class="text-[10px] font-bold brand-orange">בית</span>
</button>
<button class="flex flex-col items-center gap-1 group text-gray-400 hover:text-brand-orange transition-colors">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="text-[10px] font-bold">חברויות</span>
</button>
</div>
<!-- Center Floating Action Button -->
<div class="absolute left-1/2 -translate-x-1/2 -top-1/2">
<button class="bg-brand-orange text-white p-4 rounded-full shadow-lg shadow-orange-300 hover:scale-110 active:scale-95 transition-all">
<svg class="h-8 w-8" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 4v16m8-8H4" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</div>
<!-- Left Nav Items -->
<div class="flex items-center gap-10">
<button class="flex flex-col items-center gap-1 group text-gray-400 hover:text-brand-orange transition-colors">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="text-[10px] font-bold">מובילים</span>
</button>
<button class="flex flex-col items-center gap-1 group text-gray-400 hover:text-brand-orange transition-colors">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="text-[10px] font-bold">צ'אטים</span>
</button>
</div>
</div>
</nav>
<!-- END: BottomNavigation -->
</body></html>
