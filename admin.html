<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול בית המדרש - Admin Panel</title>
    <!-- CSS Libraries -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #3b82f6;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --border: #334155;
            --danger: #ef4444;
            --success: #22c55e;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 260px;
            background: var(--card-bg);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 1rem;
            gap: 0.5rem;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .admin-tab-btn {
            background: transparent;
            border: none;
            color: #94a3b8;
            padding: 12px;
            text-align: right;
            cursor: pointer;
            border-radius: 8px;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
            width: 100%;
        }

        .admin-tab-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }

        .admin-tab-btn.active {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        /* Main Content Styling */
        .content {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            position: relative;
            background-color: var(--bg);
        }

        .admin-section {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .admin-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Dashboard & Components */
        .admin-card,
        .stat-box {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--primary);
            line-height: 1;
        }

        .stat-label {
            color: #94a3b8;
            margin-top: 5px;
            font-size: 0.9rem;
        }

        /* Inputs & Buttons */
        .admin-input {
            width: 100%;
            padding: 10px;
            background: #020617;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        .admin-btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            color: white;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: filter 0.2s;
            font-size: 0.9rem;
        }

        .admin-btn:hover {
            filter: brightness(1.1);
        }

        /* Tables */
        .admin-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }

        .admin-table th {
            text-align: right;
            padding: 15px;
            border-bottom: 1px solid var(--border);
            color: #94a3b8;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.2);
        }

        .admin-table td {
            padding: 15px;
            border-bottom: 1px solid #334155;
        }

        .admin-table tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .toast-message {
            background: var(--card-bg);
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            border-right: 4px solid var(--primary);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            pointer-events: auto;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.3s ease;
        }

        .toast-success {
            border-color: var(--success);
        }

        .toast-error {
            border-color: var(--danger);
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Modals */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(4px);
            z-index: 5000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 16px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
            color: white;
        }

        /* Helpers */
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #334155;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: var(--success);
        }

        input:checked+.slider:before {
            transform: translateX(24px);
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h2 style="padding: 0 10px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; color: white;">
            <i class="fas fa-shield-alt text-blue-500"></i> ניהול
        </h2>
        <button class="admin-tab-btn active" onclick="switchAdminTab('dashboard')"><i class="fas fa-tachometer-alt"></i>
            ראשי</button>
        <button class="admin-tab-btn" onclick="switchAdminTab('users')"><i class="fas fa-users"></i> משתמשים</button>
        <button class="admin-tab-btn" onclick="switchAdminTab('reports')"><i class="fas fa-flag"></i> דיווחים</button>
        <button class="admin-tab-btn" onclick="switchAdminTab('inbox')"><i class="fas fa-inbox"></i> הודעות
            נכנסות</button>
        <button class="admin-tab-btn" onclick="switchAdminTab('donations')"><i class="fas fa-hand-holding-heart"></i>
            תרומות</button>
        <button class="admin-tab-btn" onclick="switchAdminTab('shop')"><i class="fas fa-store"></i> חנות</button>
        <button class="admin-tab-btn" onclick="switchAdminTab('tools')"><i class="fas fa-tools"></i> כלים
            ותחזוקה</button>
        <button class="admin-tab-btn" onclick="switchAdminTab('sql')"><i class="fas fa-terminal"></i> מסוף SQL</button>

        <div style="margin-top: auto;">
            <div id="adminUserDisplay" style="font-size: 0.8rem; color: #64748b; padding: 10px; text-align: center;">
            </div>
            <button class="admin-tab-btn" onclick="location.reload()" style="color: var(--danger);"><i
                    class="fas fa-sign-out-alt"></i> יציאה / רענון</button>
        </div>
    </div>

    <!-- Content Area -->
    <div class="content active" id="screen-admin">
        <!-- Dashboard Section -->
        <div id="admin-sec-dashboard" class="admin-section active">
            <h1>לוח בקרה</h1>
            <div class="stat-grid">
                <div class="stat-box">
                    <div class="stat-value" id="adminOnlineCount">0</div>
                    <div class="stat-label">מחוברים כעת</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="adminTotalUsers">0</div>
                    <div class="stat-label">סה"כ משתמשים</div>
                </div>
            </div>
            <div class="admin-card">
                <h3><i class="fas fa-chart-line"></i> פעילות משתמשים (24 שעות)</h3>
                <canvas id="adminActivityChart" height="80"></canvas>
            </div>
            <div class="admin-card">
                <h3><i class="fas fa-wifi"></i> משתמשים מחוברים</h3>
                <div id="adminOnlineList" style="display: flex; gap: 10px; flex-wrap: wrap;"></div>
            </div>
        </div>

        <!-- Users Section -->
        <div id="admin-sec-users" class="admin-section">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <h2>ניהול משתמשים</h2>
                <input type="text" id="adminSearch" class="admin-input" style="width: 300px;"
                    placeholder="חיפוש משתמש..." oninput="renderAdminUsersTable()">
            </div>
            <div class="admin-card">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>שם</th>
                            <th>אימייל</th>
                            <th>עיר</th>
                            <th>מנוי</th>
                            <th>פעולות</th>
                        </tr>
                    </thead>
                    <tbody id="adminUsersList"></tbody>
                </table>
            </div>
        </div>

        <!-- Placeholders for sections populated by admin.js -->
        <div id="admin-sec-reports" class="admin-section">
            <h2>דיווחים</h2>
            <div id="adminReportsList"></div>
        </div>
        <div id="admin-sec-inbox" class="admin-section">
            <h2>הודעות למערכת</h2>
            <div id="adminInboxList"></div>
        </div>
        <div id="admin-sec-donations" class="admin-section"></div>
        <div id="admin-sec-shop" class="admin-section"></div>
        <div id="admin-sec-tools" class="admin-section"></div>
        <div id="admin-sec-sql" class="admin-section"></div>
        <div id="admin-sec-suggestions" class="admin-section">
            <h2>הצעות ייעול</h2>
            <div id="adminSuggestionsList"></div>
        </div>
        <div id="admin-sec-marketing" class="admin-section">
            <h2>שיווק</h2>
            <div id="adminMarketingList"></div>
        </div>
        <div id="admin-sec-roadmap" class="admin-section"></div>
    </div>

    <!-- Utility Elements (Toasts & Modals required by admin.js) -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Confirmation Modal -->
    <div id="customConfirmModal" class="modal-overlay">
        <div class="modal-content" style="text-align: center;">
            <h3 id="cConfirmMsg" style="margin-bottom: 2rem;"></h3>
            <div style="display: flex; gap: 15px; justify-content: center;">
                <button id="cConfirmOk" class="admin-btn" style="background: var(--success); flex:1;">אישור</button>
                <button id="cConfirmCancel" class="admin-btn" style="background: var(--danger); flex:1;">ביטול</button>
            </div>
        </div>
    </div>

    <!-- Alert Modal -->
    <div id="customAlertModal" class="modal-overlay">
        <div class="modal-content" style="text-align: center;">
            <div id="cAlertMsg" style="margin-bottom: 20px;"></div>
            <button id="cAlertBtn" class="admin-btn" style="background: var(--primary); width:100%;">אישור</button>
        </div>
    </div>

    <!-- Prompt Modal -->
    <div id="customPromptModal" class="modal-overlay">
        <div class="modal-content">
            <h3 id="cPromptMsg" style="margin-bottom: 10px;"></h3>
            <input type="text" id="cPromptInput" class="admin-input">
            <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 15px;">
                <button id="cPromptCancel" class="admin-btn" style="background: var(--danger);">ביטול</button>
                <button id="cPromptOk" class="admin-btn" style="background: var(--success);">אישור</button>
            </div>
        </div>
    </div>

    <!-- Admin Specific Modals -->
    <div id="adminNotesModal" class="modal-overlay">
        <div class="modal-content">
            <h3 id="adminNotesTitle"></h3>
            <div id="adminNotesContent"></div><button class="admin-btn"
                onclick="document.getElementById('adminNotesModal').style.display='none'"
                style="margin-top: 15px; background: var(--danger); width:100%;">סגור</button>
        </div>
    </div>
    <div id="adminChatModal" class="modal-overlay">
        <div class="modal-content" style="max-width: 800px; height: 80vh; display: flex; flex-direction: column;">
            <div id="adminChatContent" style="flex: 1; overflow: hidden; display: flex; flex-direction: column;"></div>
            <button class="admin-btn" onclick="document.getElementById('adminChatModal').style.display='none'"
                style="margin-top: 10px; background: var(--danger);">סגור</button>
        </div>
    </div>
    <div id="userSelectionModal" class="modal-overlay">
        <div class="modal-content">
            <h3>בחר משתמשים</h3><input type="text" id="userSelectSearch" class="admin-input" placeholder="חפש..."
                oninput="renderUserSelectionList()">
            <div id="userSelectionList" style="max-height: 300px; overflow-y: auto;"></div>
            <div style="margin-top: 10px; display: flex; gap: 10px;"><button class="admin-btn"
                    style="background: var(--success); flex: 1;" onclick="confirmUserSelection()">אישור</button><button
                    class="admin-btn" style="background: var(--danger);"
                    onclick="document.getElementById('userSelectionModal').style.display='none'">ביטול</button></div>
        </div>
    </div>

    <!-- Hidden inputs for admin logic -->
    <input type="hidden" id="resetChatEmail1"><input type="hidden" id="resetChatStart"><input type="hidden"
        id="resetChatEnd"><textarea id="adminAdsContent" style="display:none;"></textarea>

    <!-- External Libs -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- App Scripts -->
    <script src="config.js"></script>
    <script src="utils.js"></script>
    <script src="api.js"></script>
    <script src="admin.js"></script>

    <script>
        // הפעלה אוטומטית ללא התחברות
        window.addEventListener('DOMContentLoaded', () => {
            // דילוג על מסך כניסה והפעלה ישירה
            initAdminPanel({ email: 'admin@local', id: 'admin' });
        });

        async function initAdminPanel(user) {
            window.currentUser = { email: user.email, ...user }; // יצירת משתמש מדומה
            window.isAdminMode = true;
            document.getElementById('adminUserDisplay').innerText = user.email;

            await syncGlobalData();
            renderAdminPanel();

            // רענון אוטומטי כל 10 שניות
            setInterval(async () => {
                await syncGlobalData();
                // renderAdminPanel ייקרא אוטומטית ע"י api.js כי הוספנו את ה-ID screen-admin
            }, 10000);
        }

        // פונקציות דמי (Mock) כדי למנוע שגיאות בקריאה לפונקציות שלא קיימות בקובץ זה
        window.openChat = (e, n) => alert(`פתיחת צ'אט מלא לא זמינה כאן.`);
        window.updateProfileUI = () => { };
        window.switchScreen = () => { };
        window.updateHeader = () => { };
        window.updateNotifUI = () => { };
        window.renderGoals = () => { };
        window.renderChavrutas = () => { };
    </script>
</body>

</html>
